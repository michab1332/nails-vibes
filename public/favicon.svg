<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF007A" /> <stop offset="100%" stop-color="#8A2BE2" /> </linearGradient>
    </defs>

    <path d="M60 140L100 40L140 140" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M80 140L100 90L120 140" stroke="url(#neonGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

    <text x="100" y="180" text-anchor="middle" font-family="Orbitron, sans-serif" font-size="20" font-weight="900" fill="white" letter-spacing="3">NAILS VIBES</text>
